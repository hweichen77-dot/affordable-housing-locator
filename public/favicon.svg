<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1811"/>
      <stop offset="1" stop-color="#11100c"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2B657"/>
      <stop offset="1" stop-color="#E39A2E"/>
    </linearGradient>
  </defs>

  <!-- rounded-square backdrop -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <!-- map pin (teardrop) that reads as "location" -->
