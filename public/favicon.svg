    c-160 0 -290 128 -290 288
    c0 200 250 400 290 452
    c40 -52 290 -252 290 -452
    c0 -160 -130 -288 -290 -288 z"/>

  <!-- house cut out of the pin head -->
  <path fill="#17140F" d="M512 300
    L392 404
    L392 560
    L462 560
    L462 476
    L562 476
    L562 560
    L632 560
    L632 404 z"/>
  <!-- roof overhang accent -->
  <path fill="#17140F" d="M512 286 L360 418 L392 452 L512 344 L632 452 L664 418 z"/>
</svg>
