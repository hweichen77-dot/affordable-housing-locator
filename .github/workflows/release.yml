name: Release Desktop Installers

# Builds the macOS .dmg (universal Intel + Apple Silicon) and Windows .msi/.exe
# and attaches them to the matching GitHub Release WITHOUT touching its notes.
#
# Triggers:
#   - pushing a tag like v1.2.3 -> builds + attaches for that tag
#   - manual run (Actions tab)  -> builds whatever tag you type (backfill old releases)
#
# .msi can only be produced on windows-latest (WiX is Windows-only); that is why
# this runs in CI rather than a local mac build.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Release tag to build (e.g. v1.8.0)'
        required: true
        default: 'v1.10.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest       # -> universal .dmg
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
            glob: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          - platform: windows-latest     # -> .msi (WiX) + .exe (NSIS)
            rust-targets: ''
            args: ''
            glob: src-tauri/target/release/bundle/msi/*.msi src-tauri/target/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Resolve ref
        id: ref
        shell: bash
        run: echo "value=${{ github.event.inputs.ref || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.value }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm install

      - name: Build installers
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Attach installers to the release (keeps existing notes)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.ref.outputs.value }}" ${{ matrix.glob }} --clobber
